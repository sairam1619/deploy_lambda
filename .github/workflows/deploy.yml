name: Deploy Lambda with Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  TF_ROOT: infra
  PYTHONPATH: .

jobs:
  terraform-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: |
          cd $TF_ROOT
          terraform fmt

  terraform-validate:
    runs-on: ubuntu-latest
    needs: terraform-format
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: |
          cd $TF_ROOT
          terraform init

      - name: Terraform Validate
        run: |
          cd $TF_ROOT
          terraform validate

  test:
    runs-on: ubuntu-latest
    needs: terraform-validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python
        run: |
          python -m py_compile src/lambda_code/*.py

      - name: Run Tests
        run: |
          pytest tests/ -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Terraform Init
        run: |
          cd $TF_ROOT
          terraform init

      - name: Deploy Lambda
        run: |
          cd $TF_ROOT
          terraform apply -auto-approve -target=aws_lambda_function.lambda_function

  destroy:
    runs-on: ubuntu-latest
    if: false
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Destroy
        run: |
          cd $TF_ROOT
          terraform init
          terraform destroy -auto-approve
