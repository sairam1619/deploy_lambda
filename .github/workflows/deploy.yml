name: Deploy Lambda with Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy

env:
  TF_ROOT: infra
  AWS_REGION: us-west-2

jobs:
  ci-and-plan:
    name: CI & Terraform Plan
    runs-on: ubuntu-latest
    # Skip this job if we are just trying to destroy
    if: github.event.inputs.action != 'destroy'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python Unit Tests
        run: |
          pip install -r requirements.txt pytest
          PYTHONPATH=. pytest tests/ -v

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format, Validate & Plan
        run: |
          cd ${{ env.TF_ROOT }}
          terraform init
          terraform fmt -check
          terraform validate
          terraform plan

  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: ci-and-plan
    environment: production # This is what triggers the manual approval pause
    if: github.event_name == 'push' || github.event.inputs.action == 'deploy'

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Apply
        run: |
          cd ${{ env.TF_ROOT }}
          terraform init
          terraform apply -auto-approve

  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    environment: production # Requires manual approval for teardown too
    if: github.event.inputs.action == 'destroy'

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Destroy
        run: |
          cd ${{ env.TF_ROOT }}
          terraform init
          terraform destroy -auto-approve
