name: Deploy Lambda with Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

env:
  TF_ROOT: infra
  AWS_REGION: us-west-2

jobs:
  terraform-format:
    name: Terraform Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: |
          cd $TF_ROOT
          terraform fmt -check

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: terraform-format

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Access
        run: aws sts get-caller-identity

      - name: Terraform Init (No Backend)
        run: |
          cd $TF_ROOT
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd $TF_ROOT
          terraform validate

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: terraform-validate

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile Python Files
        run: |
          python -m py_compile src/lambda_code/*.py

      - name: Run Pytest
        run: |
          PYTHONPATH=. pytest tests/ -v

  deploy:
    name: Deploy Lambda
    runs-on: ubuntu-latest
    needs: test
    # Only run deploy on a branch push OR if manual trigger action is 'apply'
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Access
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: |
          cd $TF_ROOT
          terraform init

      - name: Terraform Plan
        run: |
          cd $TF_ROOT
          terraform plan

      - name: Terraform Apply
        run: |
          cd $TF_ROOT
          terraform apply -auto-approve -input=false

  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    # Only run destroy if explicitly requested via the manual workflow_dispatch
    if: github.event.inputs.action == 'destroy'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          cd $TF_ROOT
          terraform init

      - name: Terraform Destroy
        run: |
          cd $TF_ROOT
          terraform destroy -auto-approve -input=false