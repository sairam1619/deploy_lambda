name: Deploy Lambda with Terraform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action to perform'
        required: true
        default: 'apply'
        type: choice
        options:
          - apply
          - destroy

env:
  TF_ROOT: infra
  AWS_REGION: us-west-2

jobs:
  # ==========================================
  # 1. CI & SECURITY CHECKS (Run in Parallel)
  # ==========================================
  terraform-checks:
    name: Terraform format, int & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform -chdir=${{ env.TF_ROOT }} fmt 

      - name: Terraform Init (No Backend)
        run: terraform -chdir=${{ env.TF_ROOT }} init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=${{ env.TF_ROOT }} validate

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  test-and-sonar:
    name: Tests & SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for accurate SonarQube blame info

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies & Run Tests
        run: |
          pip install -r requirements.txt pytest coverage
          coverage run -m pytest tests/ -v
          coverage xml

      - name: Sonar Scan
        uses: sonarsource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================
  # 2. DEPLOYMENT (Requires Manual Approval)
  # ==========================================
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: [terraform-checks, trivy-scan, test-and-sonar]
    if: github.event_name == 'push' || github.event.inputs.action == 'apply'
    
    # Acts like GitLab's 'when: manual' (Requires Environment configuration in GitHub)
    environment:
      name: production 

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_ROOT }} init

      - name: Terraform Plan
        run: terraform -chdir=${{ env.TF_ROOT }} plan

      - name: Terraform Apply
        run: terraform -chdir=${{ env.TF_ROOT }} apply -auto-approve

  # ==========================================
  # 3. DESTROY (Manual Trigger Only)
  # ==========================================
  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    needs: [terraform-checks, trivy-scan, test-and-sonar, deploy]
    if: github.event.inputs.action == 'destroy'
    
    environment:
      name: production

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: terraform -chdir=${{ env.TF_ROOT }} init

      - name: Terraform Destroy
        run: terraform -chdir=${{ env.TF_ROOT }} destroy -auto-approve
